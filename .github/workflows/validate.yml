name: Validate LuaSkill

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation dependencies
        run: python -m pip install --upgrade pip pyyaml

      - name: Validate strict skill layout
        run: python ./scripts/validate_skill.py

      - name: Build demo release package
        run: python ./scripts/package_skill.py --out-dir ./dist

      - name: Upload demo artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luaskills-demo-skill-package
          path: dist/*
