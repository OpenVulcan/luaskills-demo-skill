tool_dependencies:
  - name: rg
    version: "14.1.1"
    required: false
    scope: skill
    source:
      type: github_release
      github:
        repo: BurntSushi/ripgrep
    packages:
      windows-x64:
        archive_type: zip
        asset_name: ripgrep-14.1.1-x86_64-pc-windows-msvc.zip
        exports:
          - archive_path: rg.exe
            target_path: bin/rg.exe
      windows-arm64:
        archive_type: zip
        asset_name: ripgrep-14.1.1-aarch64-pc-windows-msvc.zip
        exports:
          - archive_path: rg.exe
            target_path: bin/rg.exe
      linux-x64:
        archive_type: tar_gz
        asset_name: ripgrep-14.1.1-x86_64-unknown-linux-musl.tar.gz
        exports:
          - archive_path: rg
            target_path: bin/rg
            executable: true
      linux-arm64:
        archive_type: tar_gz
        asset_name: ripgrep-14.1.1-aarch64-unknown-linux-gnu.tar.gz
        exports:
          - archive_path: rg
            target_path: bin/rg
            executable: true
      macos-x64:
        archive_type: tar_gz
        asset_name: ripgrep-14.1.1-x86_64-apple-darwin.tar.gz
        exports:
          - archive_path: rg
            target_path: bin/rg
            executable: true
      macos-arm64:
        archive_type: tar_gz
        asset_name: ripgrep-14.1.1-aarch64-apple-darwin.tar.gz
        exports:
          - archive_path: rg
            target_path: bin/rg
            executable: true
lua_dependencies: []
ffi_dependencies: []
